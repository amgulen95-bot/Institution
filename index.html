<body>
    <div id="app">
        <style>
            html {
                /* same as ant-design-vue/dist/reset.css setting, avoid the title line-height changed */
                line-height: 1.15;
            }
            
            .app-loading {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 100%;
                background-color: #f4f7f9;
            }

            html[data-theme='dark'] .app-loading {
                background-color: #2c344a;
            }
            
            .app-loading .app-loading-wrap {
                display: flex;
                position: absolute;
                top: 50%;
                left: 50%;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                transform: translate3d(-50%, -50%, 0);
            }

            .app-loading-card {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 148px;
                height: 148px;
                position: relative;
                box-sizing: border-box;
                border: 1px solid #dce6f5;
                border-radius: 30px;
                background: linear-gradient(180deg, #ffffff 0%, #f9fbfd 100%);
                box-shadow: 0 24px 60px rgba(31, 43, 61, 0.12);
            }

            .app-loading-card::before {
                content: '';
                position: absolute;
                inset: 26px;
                border: 1px solid rgba(10, 90, 255, 0.12);
                border-radius: 24px;
                animation: myy-loading-breath 1.9s ease-in-out infinite;
            }

            .app-loading .app-loading-logo-shell {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 84px;
                height: 84px;
                position: relative;
                z-index: 1;
                border: 1px solid #d8e6ff;
                border-radius: 22px;
                background: #eef5ff;
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.72);
                animation: myy-logo-float 2.4s ease-in-out infinite;
                overflow: hidden;
            }

            .app-loading .app-loading-logo-shell::after {
                content: '';
                position: absolute;
                top: -35%;
                left: -60%;
                width: 42%;
                height: 170%;
                transform: rotate(22deg);
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.62), transparent);
                animation: myy-logo-sheen 2.8s ease-in-out infinite;
            }

            .app-loading .app-loading-logo {
                display: block;
                width: 54px;
                height: 54px;
                position: relative;
                z-index: 1;
                object-fit: contain;
            }

            .app-loading-progress {
                width: 148px;
                height: 3px;
                margin-top: 22px;
                overflow: hidden;
                border-radius: 999px;
                background: #e8eef7;
            }

            .app-loading-progress span {
                display: block;
                width: 44%;
                height: 100%;
                border-radius: inherit;
                background: linear-gradient(90deg, rgba(10, 90, 255, 0.08), #0a5aff, rgba(10, 90, 255, 0.08));
                animation: myy-loading-flow 1.55s ease-in-out infinite;
            }

            .app-loading .app-loading-title {
                margin-top: 18px;
                color: #1d2533;
                font-size: 18px;
                font-weight: 400;
                line-height: 26px;
            }

            html[data-theme='dark'] .app-loading .app-loading-title {
                color: rgb(255 255 255 / 85%);
            }

            .app-loading .app-loading-subtitle {
                margin-top: 6px;
                color: #5f6a7a;
                font-size: 13px;
                font-weight: 400;
                line-height: 20px;
            }

            @keyframes myy-loading-breath {
                0%,
                100% {
                    opacity: 0.55;
                    transform: scale(0.98);
                }

                50% {
                    opacity: 1;
                    transform: scale(1.02);
                }
            }

            @keyframes myy-loading-flow {
                0% {
                    transform: translateX(-110%);
                }

                100% {
                    transform: translateX(260%);
                }
            }

            @keyframes myy-logo-float {
                0%,
                100% {
                    transform: translateY(0);
                    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.72), 0 8px 20px rgba(10, 90, 255, 0.08);
                }

                50% {
                    transform: translateY(-3px);
                    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.78), 0 12px 26px rgba(10, 90, 255, 0.12);
                }
            }

            @keyframes myy-logo-sheen {
                0%,
                52% {
                    transform: translateX(0) rotate(22deg);
                    opacity: 0;
                }

                62% {
                    opacity: 1;
                }

                100% {
                    transform: translateX(360%) rotate(22deg);
                    opacity: 0;
                }
            }
        </style>
        <div class="app-loading">
            <div class="app-loading-wrap">
                <div class="app-loading-card">
                    <div class="app-loading-logo-shell">
                        <img src="./src/assets/images/health-logo-system.png" class="app-loading-logo" alt="Logo" />
                    </div>
                </div>
                <div class="app-loading-progress"><span></span></div>
                <div class="app-loading-title">
                    <%= VITE_GLOB_APP_TITLE %>
                </div>
                <div class="app-loading-subtitle">诊室数据准备中，请稍候...</div>
            </div>
        </div>
    </div>
